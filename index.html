<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
    <title>Игра</title>
</head>
<body>
    <form>
        <h1>Игра "Угадай число"</h1>
        <div id="ranges">
            <label>
                <p>Введите минимальное и максимальное значения:</p>
                <input type="number" id="minRange" placeholder="Минимальное" required>
                <input type="number" id="maxRange" placeholder="Максимальное" required>
            </label>
            <br>
            <button type="button" id="startButton" onclick="startGame()">Начать игру</button>
        </div>
        <div id="gameArea" hidden>
            <p id="instructions"></p>
            <input type="text" id="input" required>
            <button type="button" id="checkButton" onclick="play()">Проверить</button>
            <button type="button" id="resetButton" onclick="resetGame()">Начать сначала</button>
            <p id="result"></p>
        </div>
    </form>
</body>
</html>
